name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shillclawd
          POSTGRES_USER: shillclawd
          POSTGRES_PASSWORD: shillclawd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @shillclawd/api db:migrate
        env:
          DATABASE_URL: postgresql://shillclawd:shillclawd@localhost:5432/shillclawd
      - run: pnpm --filter @shillclawd/api test
        env:
          DATABASE_URL: postgresql://shillclawd:shillclawd@localhost:5432/shillclawd

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: cd packages/contracts && forge test
